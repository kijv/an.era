name: Update OpenAPI Schema

on:
  # Run every every day at midnight https://crontab.guru/#0_0_*_*_*/1
  schedule:
    - cron: "0 0 * * */1"
  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update_openapi_schema:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false
      - run: vp i --frozen-lockfile
      - name: Create Pull Request
        shell: bash
        run: node scripts/automated-update-workflow.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: openapi-schema
          SCRIPT: packages/an.era/scripts/update-openapi-schema.ts
          PR_TITLE: Update OpenAPI Schema
          PR_BODY: This auto-generated PR updates OpenAPI schema with latest available
